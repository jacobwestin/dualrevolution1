<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dual Revolution CMS</title>
</head>
<body>
  <script>
    window.CMS_MANUAL_INIT = true;
  </script>
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: {
          name: 'git-gateway',
          branch: 'main'
        },
        media_folder: 'images/uploads',
        collections: [
          {
            name: 'ai-posts',
            label: 'AI Revolution Posts',
            folder: 'ai-posts',
            create: true,
            fields: [
              {label: 'Title', name: 'title', widget: 'string'},
              {label: 'Category', name: 'category', widget: 'string'},
              {label: 'Excerpt', name: 'excerpt', widget: 'text'},
              {label: 'Body', name: 'body', widget: 'markdown'},
              {label: 'Date', name: 'date', widget: 'datetime'},
              {label: 'Author', name: 'author', widget: 'select', options: ['Human Correspondent', 'AI-Generated Report']}
            ]
          },
          {
            name: 'robot-posts',
            label: 'Robot Revolution Posts',
            folder: 'robot-posts',
            create: true,
            fields: [
              {label: 'Title', name: 'title', widget: 'string'},
              {label: 'Category', name: 'category', widget: 'string'},
              {label: 'Excerpt', name: 'excerpt', widget: 'text'},
              {label: 'Body', name: 'body', widget: 'markdown'},
              {label: 'Date', name: 'date', widget: 'datetime'},
              {label: 'Author', name: 'author', widget: 'select', options: ['Human Correspondent', 'AI-Generated Report']}
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
