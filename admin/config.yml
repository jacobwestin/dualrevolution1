backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "ai-posts"
    label: "AI Revolution Posts"
    folder: "ai-posts"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Category", name: "category", widget: "string"}
      - {label: "Excerpt", name: "excerpt", widget: "text"}
      - {label: "Body", name: "body", widget: "markdown"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Author Type", name: "author", widget: "select", options: ["Human Correspondent", "AI-Generated Report"]}

  - name: "robot-posts"
    label: "Robot Revolution Posts"
    folder: "robot-posts"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Category", name: "category", widget: "string"}
      - {label: "Excerpt", name: "excerpt", widget: "text"}
      - {label: "Body", name: "body", widget: "markdown"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Author Type", name: "author", widget: "select", options: ["Human Correspondent", "AI-Generated Report"]}
